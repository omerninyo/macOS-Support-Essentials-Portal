site_name: "פורטל הלימודים של Wediggit: קורס תמיכה בארגון macOS"
site_description: "Student Portal for the macOS Course"
site_author: "Wediggit"
site_url: "https://omerninyo.github.io/macOS-Support-Essentials-Portal/"

theme:
  name: material
  logo: assets/images/Wediggit_Logo_Black.png
  favicon: assets/images/Wediggit_Logo_Black.png
  language: he
  direction: rtl
  font:
    text: Assistant
    code: Roboto Mono
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - toc.integrate
    - search.highlight
    - navigation.footer
    - navigation.top

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

# The nav section will be appended here by sync_assets.py













